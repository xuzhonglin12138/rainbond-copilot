case: env-naming-incompatibility
assert:
  equal:
    TroubleshootResult.runtime_state.label: runtime_healthy
    TroubleshootResult.blocker_bucket: env naming incompatibility
    TroubleshootResult.verification_summary.key_error_cleared: true
    TroubleshootResult.next_handoff: delivery_verifier
  contains:
    TroubleshootResult.verification_summary.evidence_chain:
      - connection_envs
      - runtime_logs
    TroubleshootResult.verification_summary.stop_boundary:
      delivery_verifier_allowed: true
      fallback_used: false
  prose_contains:
    - "env naming incompatibility"
    - "runtime_healthy"
    - "provider connection envs"
